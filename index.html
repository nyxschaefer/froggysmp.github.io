<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="css/pico.violet.min.css">
    <script type="module" src="https://cdn.jsdelivr.net/npm/player.style/sutro/+esm"></script>
    <title>Froggy SMP Clips</title>
  </head>
  <body>
    <main class="container">
    <nav>
         <ul>
            <li><strong>Froggy SMP Clips</strong></li>
        </ul>
        <ul>
            <li><a href="index.html">Watch</a></li>
            <li><a href="upload.html">Upload</a></li>
        </ul>
    </nav>

        <article id="clips-container">
            <!-- Clips will be loaded here -->
        </article>



    </main>
    <script>
        async function loadClips() {
            try {
                const response = await fetch('/api/uploads');
                const uploads = await response.json();
                
                const container = document.getElementById('clips-container');
                
                uploads.forEach(upload => {
                    const article = document.createElement('article');
                    
                    if (upload.clip_url) {
                        article.innerHTML = `
                            <media-theme-sutro style="width:50%" class="container">
                                <video
                                    slot="media"
                                    src="${upload.clip_url}"
                                    playsinline
                                    crossorigin="anonymous"
                                ></video>
                            </media-theme-sutro>
                            <h3>${upload.clip_title}</h3>
                            <p>Editor: ${upload.editor}</p>
                        `;
                    } else if (upload.clip_file_name) {
                        article.innerHTML = `
                            <media-theme-sutro style="width:50%" class="container">
                                <video
                                    slot="media"
                                    src="/clips/${upload.clip_file_name}"
                                    playsinline
                                    crossorigin="anonymous"
                                ></video>
                            </media-theme-sutro>
                            <h3>${upload.clip_title}</h3>
                            <p>Editor: ${upload.editor}</p>
                            <a href="/clips/${upload.clip_file_name}" download><button class="secondary">Download</button></a>
                        `;
                    }
                    
                    container.appendChild(article);
                });
            } catch (error) {
                console.error('Error loading clips:', error);
            }
        }
        
        loadClips();
    </script>
  </body>
</html>

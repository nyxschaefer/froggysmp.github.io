<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="css/pico.violet.min.css">
    <link rel="stylesheet" href="home.css">
    <script type="module" src="https://cdn.jsdelivr.net/npm/player.style/sutro/+esm"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
      body {
        background: #13171f;
        color: #e2e8f0;
      }
      #clips-container {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .clip-card {
        width: 100%;
        max-width: 980px;
        margin: 0 auto;
        border-radius: 24px;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.08);
        box-shadow: 0 18px 50px rgba(0,0,0,0.28);
        overflow: hidden;
      }
      .clip-card__header {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        padding: 1rem 1.25rem;
        background: transparent;
      }
      .clip-card__title {
        margin: 0;
        font-size: 1.2rem;
        line-height: 1.2;
        color: #f8fafc;
      }
      .clip-card__meta {
        margin: 0.35rem 0 0;
        color: #a8b8d1;
        font-size: 0.95rem;
      }
      .clip-card__tag {
        display: inline-flex;
        align-items: center;
        padding: 0.4rem 0.9rem;
        border-radius: 999px;
        background: rgba(255,255,255,0.08);
        color: #d8e4ff;
        font-size: 0.82rem;
        white-space: nowrap;
      }
      .clip-card__video {
        width: 100%;
        background: transparent;
        overflow: hidden;
        border-radius: 24px;
      }
      .clip-card__video media-theme-sutro,
      .clip-card__video video {
        border-radius: 24px;
        display: block;
      }
    </style>
    <title>Froggy SMP</title>
  </head>
  <body>
    <main class="container">

    <nav>
         <ul>
            <li><strong>Froggy SMP</strong></li>
        </ul>
        <ul>
            <li><a href="index.html"><button>Watch</button></a></li>
            <li style="margin-left: .5em;"><a href="upload.html"><button class="secondary">Upload</button></a></li>
        </ul>
    </nav>

            <img src="/photos/sunset.png"
            alt="sunset"
            style="width: 100%; display: block; margin: 0 auto;"
            />
        <input
            type="text"
            name="text"
            value="Server IP: 111.111.111.111"
            aria-label="Read-only input"
            readonly
        >

    <h3>Clips</h3>
    <input
      type="search"
      id="clip-search"
      name="search"
      placeholder="Search clips by title or editor"
      aria-label="Search clips"
    />
        <div id="clips-container">
            <!-- Clips will be loaded here -->
        </div>


    </main>

    <script>
        const clips = [];

        function renderClips(filter = '') {
            const container = document.getElementById('clips-container');
            const query = filter.trim().toLowerCase();
            container.innerHTML = '';

            const filtered = clips.filter(upload => {
                if (!query) return true;
                const title = upload.clip_title?.toLowerCase() || '';
                const editor = upload.editor?.toLowerCase() || '';
                return title.includes(query) || editor.includes(query);
            });

            if (filtered.length === 0) {
                container.innerHTML = '<p>No clips match your search.</p>';
                return;
            }

            filtered.forEach(upload => {
                const article = document.createElement('article');
                article.className = 'clip-card';
                article.innerHTML = `
                    <div class="clip-card__header">
                        <div>
                            <h3 class="clip-card__title">${upload.clip_title}</h3>
                            <p class="clip-card__meta">Editor: <strong>${upload.editor}</strong></p>
                        </div>
                        <div class="clip-card__tag">${upload.timestamp ? new Date(upload.timestamp).toLocaleDateString() : 'No date'}</div>
                    </div>
                    <div class="clip-card__video">
                        <media-theme-sutro style="width:100%" class="container">
                            <video
                                slot="media"
                                src="${upload.clip_url}"
                                playsinline
                                crossorigin="anonymous"
                            ></video>
                        </media-theme-sutro>
                    </div>
                `;
                container.appendChild(article);
            });
        }

        async function loadClips() {
            try {
                const querySnapshot = await db.collection('uploads')
                    .orderBy('timestamp', 'desc')
                    .get();

                querySnapshot.forEach(doc => {
                    clips.push(doc.data());
                });

                renderClips();
            } catch (error) {
                console.error('Error loading clips:', error);
                document.getElementById('clips-container').innerHTML = '<p>Error loading clips. Please refresh the page.</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('clip-search');
            searchInput.addEventListener('input', () => renderClips(searchInput.value));
            loadClips();
        });
    </script>

  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="css/pico.green.min.css">
    <script type="module" src="https://cdn.jsdelivr.net/npm/player.style/sutro/+esm"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/vimeo-video-element/+esm"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/youtube-video-element/+esm"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <link rel="icon" type="image/x-icon" href="/photos/favicon.ico">
    <style>
      #clips-container {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1rem;
      }

      @media (min-width: 768px) {
        #clips-container {
          grid-template-columns: repeat(2, 1fr);
          gap: 1.5rem;
        }
      }

      @media (min-width: 1200px) {
        #clips-container {
          grid-template-columns: repeat(3, 1fr);
          gap: 2rem;
        }
      }
      .clip-card {
        width: 100%;
        border-radius: 24px;
        background: rgb(24,28,37);
        border: 1px solid rgba(255,255,255,0.08);
        box-shadow: 0 18px 50px rgba(0,0,0,0.28);
        overflow: hidden;
      }
      .clip-card__header {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        padding: 1rem 1.25rem;
        background: transparent;
      }
      .clip-card__title {
        display: inline-flex;
        align-items: center;
        gap: 0;
        border-radius: 999px;
        background: rgba(255,255,255,0.08);
        overflow: hidden;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        margin: 0.15rem 0 0;
        margin-right: 0.75rem;
      }
      .clip-card__title span {
        padding: 0.2rem 0.5rem;
        background: rgba(147,51,234,0.15);
        color: #c4b5fd;
        border-right: 1px solid rgba(255,255,255,0.12);
      }
      .clip-card__title strong {
        padding: 0.2rem 0.5rem;
        font-weight: 700;
        color: #f8fafc;
        text-transform: none;
        letter-spacing: normal;
        background: rgba(255,255,255,0.05);
      }
      .clip-card__meta {
        display: inline-flex;
        align-items: center;
        gap: 0;
        border-radius: 999px;
        background: rgba(255,255,255,0.08);
        overflow: hidden;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.16em;
      }
      .clip-card__meta span {
        padding: 0.2rem 0.5rem;
        background: rgba(59,130,246,0.15);
        color: #94a3b8;
        border-right: 1px solid rgba(255,255,255,0.12);
      }
      .clip-card__meta strong {
        padding: 0.2rem 0.5rem;
        font-weight: 700;
        color: #e2e8f0;
        text-transform: none;
        letter-spacing: normal;
        background: rgba(255,255,255,0.05);
      }
      .clip-card__tag {
        display: inline-flex;
        align-items: center;
        padding: 0.4rem 0.9rem;
        border-radius: 999px;
        background: rgba(255,255,255,0.08);
        color: #d8e4ff;
        font-size: 0.82rem;
        white-space: nowrap;
      }
      .clip-card__video {
        width: 100%;
        aspect-ratio: 16 / 9;
        background: transparent;
        overflow: hidden;
        border-radius: 24px;
      }
      .clip-card__video media-theme-sutro,
      .clip-card__video youtube-video,
      .clip-card__video vimeo-video,
      .clip-card__video video {
        width: 100%;
        height: 100%;
        border-radius: 24px;
        display: block;
      }
    </style>
    <title>Froggy SMP</title>
  </head>
  <body>
    <main class="container">

    <nav>
         <ul>
            <li><img src="photos/favicon.ico" alt="Froggy SMP" style="height: 24px; width: 24px; margin-right: 0.5rem; vertical-align: middle;"><strong>Froggy SMP</strong></li>
        </ul>
        <ul>
            <li><a href="index.html"><button>Watch</button></a></li>
            <li style="margin-left: .5em;"><a href="upload.html"><button class="secondary">Upload</button></a></li>
        </ul>
    </nav>

            <img src="/photos/sunset.png"
            alt="sunset"
            style="width: 100%; display: block; margin: 0 auto;"
            />
        <input
            type="text"
            name="text"
            value="Server IP: 111.111.111.111"
            aria-label="Read-only input"
            readonly
        >

    <h3>Clips</h3>

<form role="search">
    
    
      <input
        type="search"
        id="clip-search"
        name="search"
        placeholder="Search clips by title or editor"
        aria-label="Search clips"

      />

        <select id="clip-sort">
          <option value="latest">Latest first</option>
          <option value="oldest">Oldest first</option>
          <option value="title-asc">Title A → Z</option>
          <option value="title-desc">Title Z → A</option>
          <option value="editor-asc">Editor A → Z</option>
          <option value="editor-desc">Editor Z → A</option>
        </select>

</form>

    </div>
        <div id="clips-container">
            <!-- Clips will be loaded here -->
        </div>


    </main>

    <script>
        const clips = [];
        let currentSort = 'latest';

        function sortClips(list, sortKey) {
            return list.slice().sort((a, b) => {
                const aTitle = (a.clip_title || '').toLowerCase();
                const bTitle = (b.clip_title || '').toLowerCase();
                const aEditor = (a.editor || '').toLowerCase();
                const bEditor = (b.editor || '').toLowerCase();
                const aTime = a.timestamp ? new Date(a.timestamp).getTime() : 0;
                const bTime = b.timestamp ? new Date(b.timestamp).getTime() : 0;

                switch (sortKey) {
                    case 'oldest':
                        return aTime - bTime;
                    case 'title-asc':
                        return aTitle.localeCompare(bTitle);
                    case 'title-desc':
                        return bTitle.localeCompare(aTitle);
                    case 'editor-asc':
                        return aEditor.localeCompare(bEditor);
                    case 'editor-desc':
                        return bEditor.localeCompare(aEditor);
                    case 'latest':
                    default:
                        return bTime - aTime;
                }
            });
        }

        function isYouTubeUrl(url) {
            return url && (
                url.includes('youtube.com/watch?v=') ||
                url.includes('youtu.be/') ||
                url.includes('youtube.com/embed/') ||
                url.includes('youtube.com/v/')
            );
        }

        function isVimeoUrl(url) {
            return url && (
                url.includes('vimeo.com/') ||
                url.includes('player.vimeo.com/video/')
            );
        }

        function renderClips(filter = '', sortKey = 'latest') {
            const container = document.getElementById('clips-container');
            const query = filter.trim().toLowerCase();
            container.innerHTML = '';

            const filtered = clips.filter(upload => {
                if (!query) return true;
                const title = upload.clip_title?.toLowerCase() || '';
                const editor = upload.editor?.toLowerCase() || '';
                return title.includes(query) || editor.includes(query);
            });

            const sorted = sortClips(filtered, sortKey);

            if (sorted.length === 0) {
                container.innerHTML = '<p>No clips match your search.</p>';
                return;
            }

            sorted.forEach(upload => {
                const article = document.createElement('article');
                article.className = 'clip-card';
                article.innerHTML = `
                    <div class="clip-card__header">
                        <div class="clip-card__info">
                            <p class="clip-card__title"><span>Title</span><strong>${upload.clip_title}</strong></p>
                            <p class="clip-card__meta"><span>Editor</span><strong>${upload.editor}</strong></p>
                        </div>
                        <div class="clip-card__tag">${upload.timestamp ? new Date(upload.timestamp).toLocaleDateString() : 'No date'}</div>
                    </div>
                    <div class="clip-card__video">
                        <media-theme-sutro style="width:100%" class="container">
                            ${isYouTubeUrl(upload.clip_url) ? `
                                <youtube-video
                                    slot="media"
                                    src="${upload.clip_url}"
                                    playsinline
                                    crossorigin="anonymous"
                                ></youtube-video>
                            ` : isVimeoUrl(upload.clip_url) ? `
                                <vimeo-video
                                    slot="media"
                                    src="${upload.clip_url}"
                                    playsinline
                                    crossorigin="anonymous"
                                ></vimeo-video>
                            ` : `
                                <video
                                    slot="media"
                                    src="${upload.clip_url}"
                                    playsinline
                                    crossorigin="anonymous"
                                ></video>
                            `}
                        </media-theme-sutro>
                    </div>
                `;
                container.appendChild(article);
            });
        }

        async function loadClips() {
            try {
                const querySnapshot = await db.collection('uploads')
                    .orderBy('timestamp', 'desc')
                    .get();

                querySnapshot.forEach(doc => {
                    clips.push(doc.data());
                });

                renderClips('', currentSort);
            } catch (error) {
                console.error('Error loading clips:', error);
                document.getElementById('clips-container').innerHTML = '<p>Error loading clips. Please refresh the page.</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('clip-search');
            const sortSelect = document.getElementById('clip-sort');

            searchInput.addEventListener('input', () => renderClips(searchInput.value, sortSelect.value));
            sortSelect.addEventListener('change', () => {
                currentSort = sortSelect.value;
                renderClips(searchInput.value, currentSort);
            });

            loadClips();
        });
    </script>

  </body>
</html>

    <title>Froggy SMP</title>

  <body>
    <main class="container">

    <nav>
         <ul>
            <li><strong>Froggy SMP</strong></li>
        </ul>
        <ul>
            <li><a href="index.html"><button>Watch</button></a></li>
            <li style="margin-left: .5em;"><a href="upload.html"><button class="secondary">Upload</button></a></li>
        </ul>
    </nav>

    <article>
        
            <img src="/photos/sunset.png"
            alt="sunset"
            style="width: 100%; max-width: 600px; display: block; margin: 0 auto;"
            />

            <center><kbd style="margin-top: 1em;">111.111.111.111</kbd></center>

    </article>

    <h3>Clips</h3>
        <div id="clips-container">
            <!-- Clips will be loaded here -->
        </div>


    </main>

    <script>
        async function loadClips() {
            try {
                const container = document.getElementById('clips-container');
                
                // Get all documents from the uploads collection, ordered by timestamp
                const querySnapshot = await db.collection('uploads')
                    .orderBy('timestamp', 'desc')
                    .get();
                
                querySnapshot.forEach(doc => {
                    const upload = doc.data();
                    const article = document.createElement('article');
                    
                    article.innerHTML = `
                    <center>
                        <div class="container" style="margin-bottom: .5em;">
                        <media-theme-sutro style="width:80%" class="container">
                            <video
                                slot="media"
                                src="${upload.clip_url}"
                                playsinline
                                crossorigin="anonymous"
                            ></video>
                        </media-theme-sutro>
                        </div>
                        <div class="container" style="margin-bottom: .5em;">
                        <kbd>${upload.clip_title}</kbd>
                        </div>
                        <div class="container">
                        <kbd>Editor: ${upload.editor}</kbd>
                        </div>
                        </center>
                    
                    `;
                    
                    container.appendChild(article);
                });
            } catch (error) {
                console.error('Error loading clips:', error);
                document.getElementById('clips-container').innerHTML = '<p>Error loading clips. Please refresh the page.</p>';
            }
        }
        
        loadClips();
    </script>

  </body>
</html>

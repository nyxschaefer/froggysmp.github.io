<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="css/pico.violet.min.css">
    <script type="module" src="https://cdn.jsdelivr.net/npm/player.style/sutro/+esm"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"></script>
    <title>Froggy SMP Clips</title>
  </head>
  <body>
    <main class="container">
    <nav>
         <ul>
            <li><strong>Froggy SMP Clips</strong></li>
        </ul>
        <ul>
            <li><a href="index.html">Watch</a></li>
            <li><a href="upload.html">Upload</a></li>
        </ul>
    </nav>

        <article id="clips-container">
            <!-- Clips will be loaded here -->
        </article>



    </main>
    <script src="firebase-config.js"></script>
    <script>
        async function loadClips() {
            try {
                const container = document.getElementById('clips-container');
                
                // Get all documents from the uploads collection, ordered by timestamp
                const querySnapshot = await db.collection('uploads')
                    .orderBy('timestamp', 'desc')
                    .get();
                
                querySnapshot.forEach(doc => {
                    const upload = doc.data();
                    const article = document.createElement('article');
                    
                    article.innerHTML = `
                        <media-theme-sutro style="width:50%" class="container">
                            <video
                                slot="media"
                                src="${upload.clip_url}"
                                playsinline
                                crossorigin="anonymous"
                            ></video>
                        </media-theme-sutro>
                        <h3>${upload.clip_title}</h3>
                        <p>Editor: ${upload.editor}</p>
                    `;
                    
                    container.appendChild(article);
                });
            } catch (error) {
                console.error('Error loading clips:', error);
                document.getElementById('clips-container').innerHTML = '<p>Error loading clips. Please refresh the page.</p>';
            }
        }
        
        loadClips();
    </script>
  </body>
</html>

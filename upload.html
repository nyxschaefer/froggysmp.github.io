<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="css/pico.green.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <title>Upload</title>
  </head>
  <body>
    <main class="container">
    <nav>
         <ul>
            <li><img src="photos/favicon.ico" alt="Froggy SMP" style="height: 24px; width: 24px; margin-right: 0.5rem; vertical-align: middle;"><strong>Froggy SMP</strong></li>
        </ul>
        <ul>
            <li><a href="index.html"><button class="secondary">Watch</button></a></li>
            <li style="margin-left: .5em;"><a href="upload.html"><button>Upload</button></a></li>
        </ul>
    </nav>

 <article>    
<h2>Upload Your Clips</h2>
<small> Please note, uploads will not be public immediately, they will first pass through human eyes and then be submitted.</small>
</article> 
<article>
<form id="uploadForm" enctype="multipart/form-data">
    <h4>Enter information about your upload</h4>
    <fieldset class="grid">
    <input 
    type="text"
      name="clip_title"
      id="clip_title"
      placeholder="Clip Title"
      aria-label="Clip Title"
      required
    />
    <input
      type="text"
      name="editor"
      id="editor"
      placeholder="Editor"
      aria-label="Editor"
      required
    />
    </fieldset>
    <h4>Clip URL</h4>
  <fieldset>
    <input
      type="url"
      name="clip_url"
      id="clip_url"
      placeholder="https://example.com/video.mp4"
      aria-label="Clip URL"
      required
    />
  </fieldset>

  <input
    type="submit"
    value="Upload"
  />
</form>
</article>

    </main>
    <script>
      function showModal(title, message, isSuccess = true) {
        const dialog = document.createElement('dialog');
        dialog.open = true;
        dialog.innerHTML = `
          <article>
            <header>
              <button aria-label="Close" rel="prev" onclick="this.closest('dialog').close()"></button>
              <p>
                <strong>${isSuccess ? '✅' : '❌'} ${title}</strong>
              </p>
            </header>
            <p>${message}</p>
          </article>
        `;
        document.body.appendChild(dialog);
        
        dialog.addEventListener('close', () => {
          dialog.remove();
        });
      }

      document.getElementById('uploadForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const clipTitle = document.getElementById('clip_title').value;
        const editor = document.getElementById('editor').value;
        const clipUrl = document.getElementById('clip_url').value;

        if (!clipTitle || !editor || !clipUrl) {
          showModal('Validation Error', 'Please fill in all required fields', false);
          return;
        }

        try {
          // Save metadata to Firestore
          const timestamp = new Date().toISOString();
          const uploadData = {
            clip_title: clipTitle,
            editor: editor,
            clip_url: clipUrl,
            timestamp: timestamp
          };

          await db.collection('uploads').add(uploadData);
          
          showModal('Upload Successful!', 'Your clip has been uploaded successfully.', true);
          this.reset();
        } catch (error) {
          console.error('Upload error:', error);
          showModal('Upload Failed', error.message, false);
        }
      });
    </script>
  </body> 
</html>

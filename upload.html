<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="css/pico.violet.min.css">
    <title>Upload</title>
  </head>
  <body>
    <main class="container">
    <nav>
         <ul>
            <li><strong>Froggy SMP Clips</strong></li>
        </ul>
        <ul>
            <li><a href="index.html">Watch</a></li>
            <li><a href="upload.html">Upload</a></li>
        </ul>
    </nav>
 <article>    
<h2>Upload Your Clips</h2>
<small> Please note, uploads will not be public immediately, they will first pass through human eyes and then be submitted.</small>
</article> 
<article>
<form id="uploadForm" enctype="multipart/form-data">
    <h4>Enter information about your upload</h4>
    <fieldset class="grid">
    <input 
    type="text"
      name="clip_title"
      id="clip_title"
      placeholder="Clip Title"
      aria-label="Clip Title"
      required
    />
    <input
      type="text"
      name="editor"
      id="editor"
      placeholder="Editor"
      aria-label="Editor"
      required
    />
    </fieldset>
    <h4>Submit your clip</h4>
  <fieldset>
    <label>
      <input
        type="url"
        name="clip_url"
        id="clip_url"
        placeholder="Clip URL"
      />
    </label>
    OR
<input type="file" id="clip_file" name="clip_file">
  </fieldset>

  <input
    type="submit"
    value="Upload"
  />
</form>
</article>

    </main>
    <script>
      function showModal(title, message, isSuccess = true) {
        const dialog = document.createElement('dialog');
        dialog.open = true;
        dialog.innerHTML = `
          <article>
            <header>
              <button aria-label="Close" rel="prev" onclick="this.closest('dialog').close()"></button>
              <p>
                <strong>${isSuccess ? '✅' : '❌'} ${title}</strong>
              </p>
            </header>
            <p>${message}</p>
          </article>
        `;
        document.body.appendChild(dialog);
        
        dialog.addEventListener('close', () => {
          dialog.remove();
        });
      }

      document.getElementById('uploadForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const formData = new FormData(this);
        
        try {
          const response = await fetch('/api/upload', {
            method: 'POST',
            body: formData
          });
          
          const result = await response.json();
          
          if (response.ok) {
            showModal('Upload Successful!', 'Your clip has been uploaded successfully.', true);
            this.reset();
          } else {
            showModal('Upload Failed', result.error, false);
          }
        } catch (error) {
          showModal('Upload Failed', error.message, false);
        }
      });
    </script>
  </body> 
</html>
